apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ussd-vault-secrets
  namespace: open-ai-ussd-kernel
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault-system:8200"
    roleName: "ussd-kernel"
    objects: |
      - objectName: "database-url"
        secretPath: "secret/data/ussd/database"
        secretKey: "url"
      - objectName: "redis-url"
        secretPath: "secret/data/ussd/redis"
        secretKey: "url"
      - objectName: "audit-signing-key"
        secretPath: "secret/data/ussd/audit"
        secretKey: "signing-key"
      - objectName: "ecocash-api-key"
        secretPath: "secret/data/ussd/providers/ecocash"
        secretKey: "api-key"
      - objectName: "ecocash-api-secret"
        secretPath: "secret/data/ussd/providers/ecocash"
        secretKey: "api-secret"
      - objectName: "onemoney-soap-password"
        secretPath: "secret/data/ussd/providers/onemoney"
        secretKey: "password"
      - objectName: "telecash-oauth-token"
        secretPath: "secret/data/ussd/providers/telecash"
        secretKey: "token"
      - objectName: "at-api-key"
        secretPath: "secret/data/ussd/africas-talking"
        secretKey: "api-key"
  secretObjects:
    - secretName: ussd-database-secret
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
    - secretName: ussd-redis-secret
      type: Opaque
      data:
        - objectName: redis-url
          key: REDIS_URL
    - secretName: ussd-audit-secret
      type: Opaque
      data:
        - objectName: audit-signing-key
          key: AUDIT_SIGNING_SECRET
    - secretName: ussd-provider-secrets
      type: Opaque
      data:
        - objectName: ecocash-api-key
          key: ECOCASH_API_KEY
        - objectName: ecocash-api-secret
          key: ECOCASH_API_SECRET
        - objectName: onemoney-soap-password
          key: ONEMONEY_PASSWORD
        - objectName: telecash-oauth-token
          key: TELECASH_TOKEN
        - objectName: at-api-key
          key: AT_API_KEY

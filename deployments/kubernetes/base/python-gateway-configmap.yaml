apiVersion: v1
kind: ConfigMap
metadata:
  name: python-gateway-config
  namespace: open-ai-ussd-kernel
  labels:
    app.kubernetes.io/name: python-gateway
    app.kubernetes.io/component: config
data:
  ORCHESTRATOR_ADDR: "go-orchestrator:9090"
  GATEWAY_PORT: "8000"
  REDIS_URL: "redis://redis:6379/0"
  DEFAULT_LANGUAGE: "en"
  RATE_LIMIT_RPS: "10.0"

apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: open-ai-ussd-kernel
  labels:
    app.kubernetes.io/name: postgres-credentials
    app.kubernetes.io/component: database
type: Opaque
data:
  # Base64 placeholders - replace with sealed secrets or external secrets operator in production
  POSTGRES_USER: cG9zdGdyZXM=      # postgres
  POSTGRES_PASSWORD: cG9zdGdyZXM=  # postgres
  POSTGRES_DB: dXNzZF9rZXJuZWw=    # ussd_kernel

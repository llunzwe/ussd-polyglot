apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-orchestrator
  namespace: open-ai-ussd-kernel
  labels:
    app.kubernetes.io/name: go-orchestrator
    app.kubernetes.io/component: orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: go-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: go-orchestrator
        app.kubernetes.io/component: orchestrator
    spec:
      containers:
        - name: go-orchestrator
          image: openai-ussd-kernel/go-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: grpc
            - containerPort: 9091
              name: admin-grpc
            - containerPort: 8080
              name: metrics
          envFrom:
            - configMapRef:
                name: go-orchestrator-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - go-orchestrator
                topologyKey: kubernetes.io/hostname

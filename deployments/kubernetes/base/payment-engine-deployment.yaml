apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-engine
  namespace: open-ai-ussd-kernel
  labels:
    app.kubernetes.io/name: payment-engine
    app.kubernetes.io/component: rust-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-engine
        app.kubernetes.io/component: rust-engine
    spec:
      containers:
        - name: payment-engine
          image: openai-ussd-kernel/payment-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50052
              name: grpc
          envFrom:
            - configMapRef:
                name: payment-engine-config
            - secretRef:
                name: payment-engine-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            grpc:
              port: 50052
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            grpc:
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - payment-engine
                topologyKey: kubernetes.io/hostname

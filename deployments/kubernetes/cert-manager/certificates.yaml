apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ussd-internal-ca
spec:
  ca:
    secretName: ussd-ca-secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: go-orchestrator-tls
  namespace: open-ai-ussd-kernel
spec:
  secretName: go-orchestrator-tls
  issuerRef:
    name: ussd-internal-ca
    kind: ClusterIssuer
  dnsNames:
    - go-orchestrator.open-ai-ussd-kernel.svc.cluster.local
    - go-orchestrator.open-ai-ussd-kernel.svc
  usages:
    - digital signature
    - key encipherment
    - server auth
    - client auth
  privateKey:
    algorithm: ECDSA
    size: 256
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
---

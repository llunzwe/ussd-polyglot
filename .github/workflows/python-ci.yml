name: Python CI

on:
  push:
    branches: [main, master]
    paths:
      - 'python-gateway/**'
      - 'protos/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'python-gateway/**'
      - 'protos/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('python-gateway/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          cd python-gateway
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd python-gateway
          PYTHONPATH=src python3 -m pytest src/ -q
      - name: Type check (mypy)
        run: |
          cd python-gateway
          pip install mypy || true
          PYTHONPATH=src python3 -m mypy src/ --ignore-missing-imports || true
      - name: Lint (ruff)
        run: |
          cd python-gateway
          pip install ruff || true
          PYTHONPATH=src python3 -m ruff check src/ || true
      - name: Security scan (bandit)
        run: |
          cd python-gateway
          pip install bandit || true
          PYTHONPATH=src python3 -m bandit -r src/ -ll || true
      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'python-gateway/'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

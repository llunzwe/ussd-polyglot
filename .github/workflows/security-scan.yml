name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * 1' # Weekly on Monday 02:00 UTC

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret detection
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust audit
        run: |
          cd rust-engine
          cargo install cargo-audit || true
          cargo audit || true
      - name: Go audit
        run: |
          cd go-orchestrator
          go install golang.org/x/vuln/cmd/govulncheck@latest || true
          govulncheck ./... || true
      - name: Python audit
        run: |
          cd python-gateway
          pip install safety || true
          safety check -r requirements.txt || true

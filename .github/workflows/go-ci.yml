name: Go CI

on:
  push:
    branches: [main, master]
    paths:
      - 'go-orchestrator/**'
      - 'protos/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'go-orchestrator/**'
      - 'protos/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go-orchestrator/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Build
        run: cd go-orchestrator && go build ./...
      - name: Vet
        run: cd go-orchestrator && go vet ./...
      - name: Test
        run: cd go-orchestrator && go test ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go-orchestrator
          args: --timeout=5m
      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'go-orchestrator/'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

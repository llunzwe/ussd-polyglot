syntax = "proto3";

package ussd.v1.ledger;

option go_package = "github.com/openai-ussd-kernel/go-orchestrator/internal/gen/ledger";

import "v1/common/common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// =============================================================================
// OPEN AI-USSD KERNEL ENGINE - LEDGER SERVICES (v1)
// =============================================================================
// Bounded Context: Immutable Ledger (CQRS Read Side)
// Responsibility: Account balances, statements, transactions, virtual accounts,
// liquidity positions, settlement instructions, suspense items, and chart of
// accounts. All services are query-only; mutations flow through the event store.
// Language: Go (orchestrator read projections) / Rust (event replay).
// =============================================================================

// -----------------------------------------------------------------------------
// 1. Core Ledger Queries
// -----------------------------------------------------------------------------

service LedgerQueryService {
    rpc GetAccountBalance(GetAccountBalanceRequest) returns (AccountBalance);
    rpc GetAccountStatement(GetAccountStatementRequest) returns (GetAccountStatementResponse);
    rpc GetTransactionById(GetTransactionByIdRequest) returns (Transaction);
    rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
    rpc SearchTransactions(SearchTransactionsRequest) returns (ListTransactionsResponse);
    rpc GetAccountSummary(GetAccountSummaryRequest) returns (AccountSummary);
    rpc RebuildAccountView(RebuildAccountViewRequest) returns (RebuildAccountViewResponse);
    rpc GetMovementLegs(GetMovementLegsRequest) returns (GetMovementLegsResponse);
    rpc VerifyDoubleEntry(VerifyDoubleEntryRequest) returns (VerifyDoubleEntryResponse);
    rpc Health(ussd.v1.common.HealthRequest) returns (ussd.v1.common.HealthResponse);
}

// -----------------------------------------------------------------------------
// 2. Virtual Account Queries
// -----------------------------------------------------------------------------

service VirtualAccountService {
    rpc GetVirtualAccount(GetVirtualAccountRequest) returns (VirtualAccount);
    rpc ListVirtualAccounts(ListVirtualAccountsRequest) returns (ListVirtualAccountsResponse);
    rpc GetVirtualAccountSummary(GetVirtualAccountSummaryRequest) returns (GetVirtualAccountSummaryResponse);
    rpc GetVirtualAccountTransactions(GetVirtualAccountTransactionsRequest) returns (ListTransactionsResponse);
    rpc Health(ussd.v1.common.HealthRequest) returns (ussd.v1.common.HealthResponse);
}

// -----------------------------------------------------------------------------
// 3. Liquidity Position Queries
// -----------------------------------------------------------------------------

service LiquidityPositionService {
    rpc GetLiquidityPosition(GetLiquidityPositionRequest) returns (LiquidityPosition);
    rpc ListLiquidityPositions(ListLiquidityPositionsRequest) returns (ListLiquidityPositionsResponse);
    rpc GetLiquiditySummary(GetLiquiditySummaryRequest) returns (GetLiquiditySummaryResponse);
    rpc GetExpiringPositions(GetExpiringPositionsRequest) returns (GetExpiringPositionsResponse);
    rpc Health(ussd.v1.common.HealthRequest) returns (ussd.v1.common.HealthResponse);
}

// -----------------------------------------------------------------------------
// 4. Settlement Queries
// -----------------------------------------------------------------------------

service SettlementService {
    rpc GetSettlementInstruction(GetSettlementInstructionRequest) returns (SettlementInstruction);
    rpc ListSettlementInstructions(ListSettlementInstructionsRequest) returns (ListSettlementInstructionsResponse);
    rpc GetPendingSettlements(GetPendingSettlementsRequest) returns (GetPendingSettlementsResponse);
    rpc GetSettlementSummary(GetSettlementSummaryRequest) returns (GetSettlementSummaryResponse);
    rpc Health(ussd.v1.common.HealthRequest) returns (ussd.v1.common.HealthResponse);
}

// -----------------------------------------------------------------------------
// 5. Suspense Queries
// -----------------------------------------------------------------------------

service SuspenseService {
    rpc GetSuspenseItem(GetSuspenseItemRequest) returns (SuspenseItem);
    rpc ListSuspenseItems(ListSuspenseItemsRequest) returns (ListSuspenseItemsResponse);
    rpc GetSuspenseAgingReport(GetSuspenseAgingReportRequest) returns (GetSuspenseAgingReportResponse);
    rpc GetSuspenseActivityLog(GetSuspenseActivityLogRequest) returns (GetSuspenseActivityLogResponse);
    rpc Health(ussd.v1.common.HealthRequest) returns (ussd.v1.common.HealthResponse);
}

// -----------------------------------------------------------------------------
// 6. Chart of Accounts Queries
// -----------------------------------------------------------------------------

service ChartOfAccountsService {
    rpc GetCOAEntry(GetCOAEntryRequest) returns (COAEntry);
    rpc ListCOAEntries(ListCOAEntriesRequest) returns (ListCOAEntriesResponse);
    rpc GetPeriodEndBalance(GetPeriodEndBalanceRequest) returns (PeriodEndBalance);
    rpc ListPeriodEndBalances(ListPeriodEndBalancesRequest) returns (ListPeriodEndBalancesResponse);
    rpc Health(ussd.v1.common.HealthRequest) returns (ussd.v1.common.HealthResponse);
}


message SuspenseAgingBucket {
    string category = 1;
    int32 days_range_start = 2;
    int32 days_range_end = 3;
    int64 count = 4;
    ussd.v1.common.Money total_amount = 5;
    reserved 50 to 100;
}

message GetSuspenseAgingReportResponse {
    repeated SuspenseAgingBucket buckets = 1;
    ussd.v1.common.Error error = 2;
    reserved 50 to 100;
}

message GetSuspenseActivityLogRequest {
    string suspense_id = 1;
    string tenant_id = 2;
    ussd.v1.common.Pagination pagination = 3;
    ussd.v1.common.TracingContext tracing = 4;
    ussd.v1.common.RequestMetadata request_metadata = 5;
    reserved 50 to 100;
}

message SuspenseActivityEntry {
    string activity_id = 1;
    string suspense_id = 2;
    string activity_type = 3;
    string from_status = 4;
    string to_status = 5;
    string performed_by = 6;
    string notes = 7;
    google.protobuf.Timestamp created_at = 8;
    reserved 50 to 100;
}

message GetSuspenseActivityLogResponse {
    repeated SuspenseActivityEntry entries = 1;
    ussd.v1.common.PaginationMetadata pagination = 2;
    ussd.v1.common.Error error = 3;
    reserved 50 to 100;
}

// =============================================================================
// Chart of Accounts Messages
// =============================================================================

message GetCOAEntryRequest {
    string coa_code = 1;
    string tenant_id = 2;
    ussd.v1.common.TracingContext tracing = 3;
    ussd.v1.common.RequestMetadata request_metadata = 4;
    reserved 50 to 100;
}

message ListCOAEntriesRequest {
    string tenant_id = 1;
    string parent_code = 2;
    string account_category = 3;
    ussd.v1.common.Pagination pagination = 4;
    ussd.v1.common.TracingContext tracing = 5;
    ussd.v1.common.RequestMetadata request_metadata = 6;
    reserved 50 to 100;
}

message ListCOAEntriesResponse {
    repeated COAEntry entries = 1;
    ussd.v1.common.PaginationMetadata pagination = 2;
    ussd.v1.common.Error error = 3;
    reserved 50 to 100;
}

message COAEntry {
    string coa_code = 1;
    string tenant_id = 2;
    string account_name = 3;
    string account_category = 4;
    string parent_code = 5;
    int32 level = 6;
    bool is_leaf = 7;
    string normal_balance = 8;
    bool is_active = 9;
    ussd.v1.common.Error error = 10;
    reserved 50 to 100;
}

message GetPeriodEndBalanceRequest {
    string account_id = 1;
    string tenant_id = 2;
    string fiscal_period_id = 3;
    ussd.v1.common.TracingContext tracing = 4;
    ussd.v1.common.RequestMetadata request_metadata = 5;
    reserved 50 to 100;
}

message ListPeriodEndBalancesRequest {
    string tenant_id = 1;
    string fiscal_period_id = 2;
    ussd.v1.common.Pagination pagination = 3;
    ussd.v1.common.TracingContext tracing = 4;
    ussd.v1.common.RequestMetadata request_metadata = 5;
    reserved 50 to 100;
}

message ListPeriodEndBalancesResponse {
    repeated PeriodEndBalance balances = 1;
    ussd.v1.common.PaginationMetadata pagination = 2;
    ussd.v1.common.Error error = 3;
    reserved 50 to 100;
}

message PeriodEndBalance {
    string balance_id = 1;
    string account_id = 2;
    string tenant_id = 3;
    string fiscal_period_id = 4;
    ussd.v1.common.Money opening_balance = 5;
    ussd.v1.common.Money closing_balance = 6;
    ussd.v1.common.Money total_debits = 7;
    ussd.v1.common.Money total_credits = 8;
    string currency = 9;
    bool is_adjusted = 10;
    google.protobuf.Timestamp created_at = 11;
    ussd.v1.common.Error error = 12;
    reserved 50 to 100;
}

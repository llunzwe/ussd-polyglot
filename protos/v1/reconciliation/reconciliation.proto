syntax = "proto3";

package ussd.v1.reconciliation;

option go_package = "github.com/openai-ussd-kernel/go-orchestrator/internal/gen/reconciliation";

import "v1/common/common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// =============================================================================
// OPEN AI-USSD KERNEL ENGINE - RECONCILIATION SERVICE (v1)
// =============================================================================
// Bounded Context: Reconciliation Engine
// Responsibility: Provider statement matching, discrepancy resolution,
// matching rule management, and regulatory reporting.
// Language: Go / Rust.
// =============================================================================

service ReconciliationService {
    rpc StartReconciliation(StartReconciliationRequest) returns (ReconciliationRun);
    rpc GetReconciliationRun(GetReconciliationRunRequest) returns (ReconciliationRun);
    rpc ListReconciliationRuns(ListReconciliationRunsRequest) returns (ListReconciliationRunsResponse);
    rpc GetReconciliationItems(GetReconciliationItemsRequest) returns (GetReconciliationItemsResponse);
    rpc ResolveDiscrepancy(ResolveDiscrepancyRequest) returns (ReconciliationItem);
    rpc BulkResolveDiscrepancies(BulkResolveDiscrepanciesRequest) returns (ussd.v1.common.BatchOperationResult);
    rpc GenerateReport(GenerateReportRequest) returns (GenerateReportResponse);
    rpc GetMatchingRule(GetMatchingRuleRequest) returns (MatchingRule);
    rpc ListMatchingRules(ListMatchingRulesRequest) returns (ListMatchingRulesResponse);
    rpc Health(ussd.v1.common.HealthRequest) returns (ussd.v1.common.HealthResponse);
}

enum ReconciliationStatus {
    RECONCILIATION_STATUS_UNSPECIFIED = 0;
    RECONCILIATION_PENDING = 1;
    RECONCILIATION_RUNNING = 2;
    RECONCILIATION_COMPLETED = 3;
    RECONCILIATION_FAILED = 4;
    RECONCILIATION_PARTIALLY_RESOLVED = 5;
    RECONCILIATION_APPROVED = 6;
    reserved 7 to 20;
}

enum DiscrepancyType {
    DISCREPANCY_TYPE_UNSPECIFIED = 0;
    MISSING_INTERNAL = 1;
    MISSING_EXTERNAL = 2;
    AMOUNT_MISMATCH = 3;
    STATUS_MISMATCH = 4;
    DUPLICATE_INTERNAL = 5;
    DUPLICATE_EXTERNAL = 6;
    FEE_MISMATCH = 7;
    TIMESTAMP_MISMATCH = 8;
    CURRENCY_MISMATCH = 9;
    reserved 10 to 20;
}

enum ResolutionAction {
    RESOLUTION_UNSPECIFIED = 0;
    RESOLUTION_CORRECT_INTERNAL = 1;
    RESOLUTION_CORRECT_EXTERNAL = 2;
    RESOLUTION_CREATE_ADJUSTMENT = 3;
    RESOLUTION_IGNORE = 4;
    RESOLUTION_ESCALATE = 5;
    RESOLUTION_APPROVE = 6;
    reserved 7 to 20;
}

message StartReconciliationRequest {
    string tenant_id = 1;
    string provider_name = 2;
    google.protobuf.Timestamp period_start = 3;
    google.protobuf.Timestamp period_end = 4;
    string initiated_by = 5;
    google.protobuf.Struct matching_rules = 6;
    ussd.v1.common.Money tolerance_amount = 7;
    ussd.v1.common.TracingContext tracing = 8;
    ussd.v1.common.RequestMetadata request_metadata = 9;
    reserved 50 to 100;
}

message GetReconciliationRunRequest {
    string run_id = 1;
    string tenant_id = 2;
    ussd.v1.common.TracingContext tracing = 3;
    ussd.v1.common.RequestMetadata request_metadata = 4;
    reserved 50 to 100;
}

message ReconciliationRun {
    string run_id = 1;
    string tenant_id = 2;
    string provider_name = 3;
    ReconciliationStatus status = 4;
    google.protobuf.Timestamp period_start = 5;
    google.protobuf.Timestamp period_end = 6;
    google.protobuf.Timestamp started_at = 7;
    google.protobuf.Timestamp completed_at = 8;
    int32 total_records = 9;
    int32 matched_count = 10;
    int32 discrepancy_count = 11;
    int32 resolved_count = 12;
    string initiated_by = 13;
    string approved_by = 14;
    google.protobuf.Timestamp approved_at = 15;
    ussd.v1.common.Money internal_total_amount = 16;
    ussd.v1.common.Money external_total_amount = 17;
    ussd.v1.common.Money discrepancy_amount = 18;
    ussd.v1.common.Error error = 19;
    reserved 50 to 100;
}

message ListReconciliationRunsRequest {
    string tenant_id = 1;
    ussd.v1.common.Pagination pagination = 2;
    string provider_name = 3;
    repeated ReconciliationStatus statuses = 4;
    google.protobuf.Timestamp from_date = 5;
    google.protobuf.Timestamp to_date = 6;
    ussd.v1.common.TracingContext tracing = 7;
    ussd.v1.common.RequestMetadata request_metadata = 8;
    reserved 50 to 100;
}

message ListReconciliationRunsResponse {
    repeated ReconciliationRun runs = 1;
    ussd.v1.common.PaginationMetadata pagination = 2;
    int32 total_count = 3;
    ussd.v1.common.Error error = 4;
    reserved 50 to 100;
}

message GetReconciliationItemsRequest {
    string run_id = 1;
    string tenant_id = 2;
    ussd.v1.common.Pagination pagination = 3;
    repeated DiscrepancyType discrepancy_types = 4;
    bool unresolved_only = 5;
    ussd.v1.common.TracingContext tracing = 6;
    ussd.v1.common.RequestMetadata request_metadata = 7;
    reserved 50 to 100;
}

message GetReconciliationItemsResponse {
    repeated ReconciliationItem items = 1;
    ussd.v1.common.PaginationMetadata pagination = 2;
    int32 total_count = 3;
    ussd.v1.common.Error error = 4;
    reserved 50 to 100;
}

message ReconciliationItem {
    string item_id = 1;
    string run_id = 2;
    string transaction_id = 3;
    DiscrepancyType discrepancy_type = 4;
    string internal_status = 5;
    string external_status = 6;
    ussd.v1.common.Money internal_amount = 7;
    ussd.v1.common.Money external_amount = 8;
    ussd.v1.common.Money difference = 9;
    bool resolved = 10;
    ResolutionAction resolution_action = 11;
    string resolved_by = 12;
    google.protobuf.Timestamp resolved_at = 13;
    string notes = 14;
    ussd.v1.common.Error error = 15;
    reserved 50 to 100;
}

message ResolveDiscrepancyRequest {
    string item_id = 1;
    string run_id = 2;
    string tenant_id = 3;
    ResolutionAction action = 4;
    string notes = 5;
    string resolved_by = 6;
    ussd.v1.common.TracingContext tracing = 7;
    ussd.v1.common.RequestMetadata request_metadata = 8;
    reserved 50 to 100;
}

message BulkResolveDiscrepanciesRequest {
    string run_id = 1;
    string tenant_id = 2;
    repeated string item_ids = 3;
    ResolutionAction action = 4;
    string notes = 5;
    string resolved_by = 6;
    ussd.v1.common.TracingContext tracing = 7;
    ussd.v1.common.RequestMetadata request_metadata = 8;
    reserved 50 to 100;
}

message GenerateReportRequest {
    string run_id = 1;
    string tenant_id = 2;
    string format = 3;
    ussd.v1.common.TracingContext tracing = 4;
    ussd.v1.common.RequestMetadata request_metadata = 5;
    reserved 50 to 100;
}

message GenerateReportResponse {
    string report_id = 1;
    string download_url = 2;
    google.protobuf.Timestamp generated_at = 3;
    ussd.v1.common.Error error = 4;
    reserved 50 to 100;
}

message GetMatchingRuleRequest {
    string rule_id = 1;
    string tenant_id = 2;
    ussd.v1.common.TracingContext tracing = 3;
    ussd.v1.common.RequestMetadata request_metadata = 4;
    reserved 50 to 100;
}

message ListMatchingRulesRequest {
    string tenant_id = 1;
    string provider_name = 2;
    ussd.v1.common.Pagination pagination = 3;
    ussd.v1.common.TracingContext tracing = 4;
    ussd.v1.common.RequestMetadata request_metadata = 5;
    reserved 50 to 100;
}

message ListMatchingRulesResponse {
    repeated MatchingRule rules = 1;
    ussd.v1.common.PaginationMetadata pagination = 2;
    ussd.v1.common.Error error = 3;
    reserved 50 to 100;
}

message MatchingRule {
    string rule_id = 1;
    string tenant_id = 2;
    string provider_name = 3;
    string rule_name = 4;
    repeated string match_fields = 5;
    ussd.v1.common.Money tolerance_amount = 6;
    int32 tolerance_time_seconds = 7;
    bool auto_resolve = 8;
    bool is_active = 9;
    google.protobuf.Timestamp created_at = 10;
    google.protobuf.Timestamp updated_at = 11;
    ussd.v1.common.Error error = 12;
    reserved 50 to 100;
}
